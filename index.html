<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Next Frame</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <!-- gif.js (renderer) -->
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
  <script type="importmap">
    {
      "imports": {
        "gifuct-js": "https://unpkg.com/gifuct-js/dist/gifuct.js"
      }
    }
  </script>
  <script type="module" src="app.js"></script>
</head>
<body>
  <main class="wrap">
    <h1>Next Frame</h1>

    <section class="controls">
      <div class="block">
        <canvas id="drawCanvas" width="256" height="256" aria-label="Drawing canvas"></canvas>
      </div>
      <div class="row">
        <label>
          Brush Size
          <input id="brushSize" type="number" inputmode="numeric" value="6" min="1" max="60" />
        </label>
        <label>
          Color
          <input id="brushColor" type="color" value="#111111" />
        </label>
      </div>
      <div class="row">
        <button id="clearFrame" class="secondary" type="button">Clear Frame</button>
        <span id="frameInfo" style="align-self:center;">Frame 1/1</span>
      </div>
      <div class="row">
        <button id="prevFrame" type="button">◀ Prev</button>
        <button id="nextFrame" type="button">Next ▶</button>
      </div>
      <div class="row">
        <button id="addFrame" type="button">+ Add Frame</button>
        <button id="deleteFrame" type="button">− Delete Frame</button>
      </div>
      <div class="row">
        <label class="file-label">Upload Image to Frame
          <input id="uploadImage" type="file" accept="image/*" />
        </label>
        <button id="aiNextFrame" class="primary" type="button">Next Frame</button>
      </div>
      <div class="block">
        <label>Base Image Prompt
          <textarea id="aiBasePrompt" rows="3" placeholder="Describe the first frame..."></textarea>
        </label>
      </div>
      <div class="row">
        <label>Animation Prompt
          <input id="aiAnimPrompt" type="text" placeholder="Describe the motion/change per frame" />
        </label>
        <label>AI Frames
          <input id="aiFrames" type="number" inputmode="numeric" value="6" min="2" max="30" />
        </label>
      </div>
      <button id="aiGenerate" class="primary" type="button">AI Generate Sequence</button>
      <button id="aiRegenerateFrame" class="secondary" type="button">Regenerate Frame</button>
      <div class="row">
        <label>
          Width
          <input id="gifWidth" type="number" inputmode="numeric" value="256" min="16" max="1024" />
        </label>
        <label>
          Height
          <input id="gifHeight" type="number" inputmode="numeric" value="256" min="16" max="1024" />
        </label>
      </div>
      <div class="row">
        <label>
          FPS
          <input id="fps" type="number" inputmode="numeric" value="10" min="1" max="60" />
        </label>
        <label>
          Quality (1 best)
          <input id="quality" type="number" inputmode="numeric" value="10" min="1" max="30" />
        </label>
      </div>
      <button id="generateGif" class="primary">Generate GIF</button>
      <div id="status" class="status"></div>
    </section>

    <section class="output">
      <h2>Result</h2>
      <div class="preview">
        <img id="resultImg" alt="Your generated GIF will appear here." />
      </div>
      <a id="downloadLink" class="download" href="#" download="animated.gif" style="display:none;">Download GIF</a>
    </section>
  </main>
<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v8c78df7c7c0f484497ecbca7046644da1771523124516" integrity="sha512-8DS7rgIrAmghBFwoOTujcf6D9rXvH8xm8JQ1Ja01h9QX8EzXldiszufYa4IFfKdLUKTTrnSFXLDkUEOTrZQ8Qg==" data-cf-beacon='{"version":"2024.11.0","token":"4c6229722a6346bc8eb5cb0e5eae5d41","server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body>
</html>
